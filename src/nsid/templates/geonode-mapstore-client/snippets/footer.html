{% load static %}
<div style="border-top:1px solid #ddd; background:#f9f9f9; padding-top:30px; padding-bottom:30px;">

    SoilFER is implemented by FAO in partnership with KALRO and the Government of Kenya, funded by the U.S. Department of State
  </p>
  <div style="display:flex; justify-content:center; align-items:stretch; flex-wrap:wrap; max-width:1000px; margin:0 auto;">

    <div style="display:flex; align-items:center; justify-content:center; background:#fff; height:90px; width:160px; border-right:1px solid #ddd;">
